name: P3-DSP Gunluk Tarama

on:
  schedule:
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimlilikları yukle
        run: |
          pip install --upgrade pip
          pip install scipy numpy yfinance pandas requests

      - name: Simulasyonu calistir
        run: python simulate_dsp.py
        env:
          DSP_USE_TV: "0"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Raporu commit et
        run: |
          git config user.name "DSP Bot"
          git config user.email "bot@p3dsp"
          git add reports/ portfolio_state.json
          git diff --cached --quiet || git commit -m "DSP tarama: $(date +'%Y-%m-%d')"
          git push origin HEAD:main