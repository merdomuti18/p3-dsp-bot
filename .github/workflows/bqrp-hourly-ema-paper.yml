# Runs BQRP hourly EMA paper using this repo's existing Telegram secrets.
# Secrets stay here (p3-dsp-bot); BQRP code is checked out each hour.
name: BQRP Hourly EMA Paper

on:
  schedule:
    - cron: "5 * * * *" # every hour at :05 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BQRP
        uses: actions/checkout@v4
        with:
          repository: merdomuti18/BQRP
          path: BQRP

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install BQRP + TradingView extra
        working-directory: BQRP
        run: pip install -e ".[tradingview]"

      - name: Scan universe + Telegram on fills
        working-directory: BQRP
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m examples.hourly_ema_paper --notify
