# Optional: if BQRP stays private, p3 can checkout it with a PAT secret
# named BQRP_CHECKOUT_TOKEN (contents: read access to merdomuti18/BQRP).
# Prefer running the cron on BQRP itself after copying TELEGRAM_* secrets there.
name: BQRP Hourly EMA Paper

on:
  workflow_dispatch:
  # schedule disabled until BQRP_CHECKOUT_TOKEN exists or BQRP is public
  # schedule:
  #   - cron: "5 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BQRP
        uses: actions/checkout@v4
        with:
          repository: merdomuti18/BQRP
          path: BQRP
          token: ${{ secrets.BQRP_CHECKOUT_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install BQRP + TradingView extra
        working-directory: BQRP
        run: pip install -e ".[tradingview]"

      - name: Scan universe + Telegram on fills
        working-directory: BQRP
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m examples.hourly_ema_paper --notify
