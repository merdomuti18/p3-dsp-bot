name: MOTT Günlük Tarama — P1 + P2 + P3

on:
  schedule:
    - cron: '5 16 * * 1-5'    # 19:05 TSİ — akşam tam tarama (P1+P2+P3+P4)
    - cron: '0 6 * * 1-5'     # 09:00 TSİ — sabah değerlendirmesi (P1+P2)
    - cron: '0 8 * * 1-5'     # 11:00 TSİ — ilk alım (P1+P2)
    - cron: '30 8 * * 1-5'    # 11:30 TSİ — portföy özeti (P1+P2)
    - cron: '0 9,10,11,12,13,14 * * 1-5'  # 12-17 TSİ — saatlik takip (P1+P2+P4)
    - cron: '30 14 * * 1-5'   # 17:30 TSİ — kapanış özeti (P1+P2)
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Çalışma modu'
        required: false
        default: 'aksam'
        type: choice
        options:
          - aksam
          - sabah
          - alim
          - ozet
          - takip
          - kapani
# Eşzamanlı çalışmayı engelle — state dosyaları çakışmasın
concurrency:
  group: mott-daily
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 1: P3-DSP (Frekans Domeni)
  # ─────────────────────────────────────────────────────
  p3-dsp:
    name: P3 — DSP Tarama
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Pip cache — kurulum 3 dk → 20 sn
      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p3-pip-${{ hashFiles('requirements_p3.txt') }}
          restore-keys: p3-pip-

      - name: Bağımlılıkları yükle
        run: |
          pip install --upgrade pip
          pip install scipy numpy yfinance pandas requests pytz

      - name: P3 tarama çalıştır
        run: python simulate_dsp.py
        env:
          MOTT_BASE_DIR: "."
          DSP_USE_TV: ${{ secrets.DSP_USE_TV || '0' }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: State ve raporu commit et
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          git add reports/ portfolio_state.json || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add reports/ portfolio_state.json || true
          git diff --cached --quiet || git commit -m "P3-DSP tarama: $(date +'%Y-%m-%d')"
          git push origin HEAD:main
  # ─────────────────────────────────────────────────────
  # JOB 2: P1 — Momentum
  # ─────────────────────────────────────────────────────
  p1-momentum:
    name: P1 — Momentum Tarama
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # P3 bitmeden başlama — state çakışmasını önle
    needs: p3-dsp
    if: always()

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          # P3'ün commit'ini al
          ref: main

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p1-pip-${{ hashFiles('requirements_p1.txt') }}
          restore-keys: p1-pip-

      - name: Bağımlılıkları yükle
        run: |
          pip install --upgrade pip
          pip install numpy pandas yfinance requests tradingview-screener pytz smartmoneyconcepts

      - name: P1 tarama çalıştır
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          MODE=${{ github.event.inputs.run_mode || 'auto' }}
          if [ "$MODE" = "auto" ]; then
            if [ "$HOUR" = "06" ]; then MODE="sabah"
            elif [ "$HOUR" = "08" ] && [ "$MINUTE" = "00" ]; then MODE="aksam"
            elif [ "$HOUR" = "08" ] && [ "$MINUTE" = "30" ]; then MODE="ozet"
            elif [ "$HOUR" = "14" ] && [ "$MINUTE" = "30" ]; then MODE="ozet"
            elif [ "$HOUR" = "16" ]; then MODE="aksam"
            else MODE="takip"
            fi
          fi
          echo "Çalışma modu: $MODE"
          if [ "$MODE" = "aksam" ] || [ "$MODE" = "sabah" ]; then
            python scanner_p1.py
          elif [ "$MODE" = "takip" ]; then
            python portfoy_yonetici.py takip
          elif [ "$MODE" = "ozet" ]; then
            python portfoy_yonetici.py ozet
          fi
        env:
          MOTT_BASE_DIR: "."
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: State commit et
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          git add state_p1.json tarama_listesi.json || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add state_p1.json tarama_listesi.json || true
          git diff --cached --quiet || git commit -m "P1 tarama: $(date +'%Y-%m-%d')"
          git push origin HEAD:main
  # ─────────────────────────────────────────────────────
  # JOB 3: P2 — SMC
  # ─────────────────────────────────────────────────────
  p2-smc:
    name: P2 — SMC Tarama
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: p1-momentum

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p2-pip-${{ hashFiles('requirements_p2.txt') }}
          restore-keys: p2-pip-

      - name: Bağımlılıkları yükle
        run: |
          pip install --upgrade pip
          pip install numpy pandas yfinance requests tradingview-screener pytz smartmoneyconcepts

      - name: P2 tarama çalıştır
        run: python scanner_smc.py
        env:
          MOTT_BASE_DIR: "."
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: State commit et
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          git pull --rebase origin main
          git add state_p2.json || true
          git diff --cached --quiet || git commit -m "P2-SMC tarama: $(date +'%Y-%m-%d')"
          git push origin HEAD:main

  # ─────────────────────────────────────────────────────
  # JOB 4: P4 — Meta Portföy
  # ─────────────────────────────────────────────────────
  p4-meta:
    name: P4 — Meta Portföy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [p1-momentum, p2-smc, p3-dsp]

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p4-pip-${{ hashFiles('requirements_p4.txt') }}
          restore-keys: p4-pip-

      - name: Bağımlılıkları yükle
        run: |
          pip install --upgrade pip
          pip install numpy pandas scipy yfinance requests pytz

      - name: P4 meta portföy çalıştır
        run: python meta_portfolio.py
        env:
          MOTT_BASE_DIR: "."
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: State commit et
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          git add state_p4.json || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add state_p4.json || true
          git diff --cached --quiet || git commit -m "P4 meta portföy: $(date +'%Y-%m-%d')"
          git push origin HEAD:main
  # ─────────────────────────────────────────────────────
  # JOB 5: Özet Rapor — 4 strateji tamamlandıktan sonra
  # ─────────────────────────────────────────────────────
  ozet-rapor:
    name: Günlük Özet Rapor
    runs-on: ubuntu-latest
    needs: [p3-dsp, p1-momentum, p2-smc, p4-meta]
    if: always()

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ozet-pip-v1
          restore-keys: ozet-pip-

      - name: Bağımlılıkları yükle
        run: pip install requests pytz

      - name: Günlük özet gönder
        run: python mott_ozet.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          P1_STATUS: ${{ needs.p1-momentum.result }}
          P2_STATUS: ${{ needs.p2-smc.result }}
          P3_STATUS: ${{ needs.p3-dsp.result }}
          P4_STATUS: ${{ needs.p4-meta.result }}


