name: MOTT Günlük Tarama — P1 + P2 + P3 + P4 + P5

on:
  schedule:
    - cron: '5 16 * * 1-5'          # ~19:05 TSİ — akşam tam tarama
    - cron: '0 6 * * 1-5'           # ~09:00 TSİ — sabah değerlendirme
    # Gün içi canlı takip: saatlik. (Not: GitHub zamanlanmış tetikleri
    # "en iyi çaba" ile çalıştırır — 15 dk'lık deneme pratikte atlandığı
    # için saatliğe çekildi. 15 dk sıklık için yol haritasına bakın:
    # README "Yapılacaklar" → harici tetikleyici ile workflow_dispatch.)
    - cron: '0 7-15 * * 1-5'        # ~10:00–18:00 TSİ, saat başı
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Çalışma modu (TSİ)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - aksam
          - sabah
          - alim
          - takip
          - kapani

concurrency:
  group: mott-daily
  # Yeni tetik, süren çalıştırmayı iptal etmesin; kuyruğa alınsın.
  cancel-in-progress: false

env:
  MOTT_BASE_DIR: "."
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  # ── Mod belirleme (TSİ) ───────────────────────────────────────────────────
  gate:
    name: Mod — TSİ
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytz
      - id: mode
        run: |
          INPUT="${{ github.event.inputs.run_mode || 'auto' }}"
          MODE=$(python mott_mode.py "$INPUT")
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "MOTT modu (TSİ): $MODE"
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'Mod — TSİ' job'ı başarısız. Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  # ── P3 — yalnızca akşam tarama ────────────────────────────────────────────
  p3-dsp:
    name: P3 — DSP
    needs: gate
    if: needs.gate.outputs.mode == 'aksam'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: P3 akşam taraması
        run: python simulate_dsp.py
        env:
          MOTT_MODE: aksam
          DSP_USE_TV: ${{ secrets.DSP_USE_TV || '0' }}
      - name: Eski raporları temizle (30 gün sakla)
        run: |
          if [ -d reports/history ]; then
            ls reports/history/*.html 2>/dev/null | sort | head -n -30 | xargs -r rm -- || true
          fi
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          for i in 1 2 3 4 5; do
            git add -A reports/ || true
            git add portfolio_state.json || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P3-DSP: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            sleep $((RANDOM % 5 + 2))
          done
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'P3 — DSP' job'ı başarısız (mod: ${{ needs.gate.outputs.mode }}). Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  # ── P1 — Momentum ─────────────────────────────────────────────────────────
  p1-momentum:
    name: P1 — Momentum
    needs: gate
    if: contains(fromJSON('["aksam","sabah","alim","takip","kapani"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: P1 çalıştır
        run: |
          MODE="${{ needs.gate.outputs.mode }}"
          echo "P1 modu: $MODE"
          export MOTT_MODE="$MODE"
          if [ "$MODE" = "aksam" ]; then
            python scanner_p1.py
          elif [ "$MODE" = "sabah" ]; then
            python portfoy_yonetici.py sabah
          elif [ "$MODE" = "alim" ]; then
            python portfoy_yonetici.py alim
          elif [ "$MODE" = "takip" ]; then
            python portfoy_yonetici.py takip
          elif [ "$MODE" = "kapani" ]; then
            python portfoy_yonetici.py kapani
          fi
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p1.json tarama_listesi.json portfoy.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P1: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'P1 — Momentum' job'ı başarısız (mod: ${{ needs.gate.outputs.mode }}). Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  # ── P2 — SMC ──────────────────────────────────────────────────────────────
  p2-smc:
    name: P2 — SMC
    needs: gate
    if: contains(fromJSON('["aksam","alim","takip"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: P2 çalıştır
        run: |
          MODE="${{ needs.gate.outputs.mode }}"
          export MOTT_MODE="$MODE"
          if [ "$MODE" = "aksam" ]; then
            python scanner_smc.py aksam
            python portfoy_yonetici.py p2_aksam
          else
            python scanner_smc.py teyit
            python portfoy_yonetici.py p2_takip
          fi
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p2.json tarama_listesi_p2.json portfoy_p2.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P2-SMC: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'P2 — SMC' job'ı başarısız (mod: ${{ needs.gate.outputs.mode }}). Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  # ── P4 — Meta (yalnızca akşam) ────────────────────────────────────────────
  p4-meta:
    name: P4 — Meta Portföy
    needs: [gate, p3-dsp, p1-momentum, p2-smc]
    if: |
      always() &&
      needs.gate.outputs.mode == 'aksam' &&
      needs.p3-dsp.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: P4 meta portföy
        run: python meta_portfolio.py
        env:
          MOTT_MODE: aksam
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p4.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P4 meta: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'P4 — Meta Portföy' job'ı başarısız (mod: ${{ needs.gate.outputs.mode }}). Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  # ── P5 — Komite (yalnızca akşam, P4 ile paralel) ─────────────────────────
  p5-komite:
    name: P5 — Komite
    needs: [gate, p3-dsp, p1-momentum, p2-smc]
    if: |
      always() &&
      needs.gate.outputs.mode == 'aksam' &&
      needs.p3-dsp.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: P5 komite portföy
        run: python p5_committee.py
        env:
          MOTT_MODE: aksam
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p5.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P5 komite: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'P5 — Komite' job'ı başarısız (mod: ${{ needs.gate.outputs.mode }}). Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  # ── Canlı takip — gün içi saatlik (yalnızca açık pozisyon kontrolü) ──────
  # P1/P2 zaten "alim"/"takip"/"kapani" job'ları üzerinden STOP/TP kontrolü
  # yapıyor. P3/P4/P5'in normal akışı yalnızca akşam çalıştığı için bu
  # job'lar gün içinde YALNIZCA açık pozisyonları kontrol eder — yeni aday
  # seçimi/tam tarama yapmaz. Fiyat kaynağı: TradingView (yfinance yedekli).
  p3-monitor:
    name: P3 — Canlı Takip
    needs: gate
    if: contains(fromJSON('["alim","takip","kapani"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: P3 acil stop kontrolü
        run: python simulate_dsp.py monitor
        env:
          MOTT_MODE: canli
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="portfolio_state.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P3 canli takip: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'P3 — Canlı Takip' job'ı başarısız (mod: ${{ needs.gate.outputs.mode }}). Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  p4-monitor:
    name: P4 — Canlı Takip
    needs: gate
    if: contains(fromJSON('["alim","takip","kapani"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: P4 STOP/TP/MAX_GUN kontrolü
        run: python meta_portfolio.py --monitor
        env:
          MOTT_MODE: canli
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p4.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P4 canli takip: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'P4 — Canlı Takip' job'ı başarısız (mod: ${{ needs.gate.outputs.mode }}). Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  p5-monitor:
    name: P5 — Canlı Takip
    needs: gate
    if: contains(fromJSON('["alim","takip","kapani"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: P5 STOP/TP/MAX_GUN kontrolü
        run: python p5_committee.py --monitor
        env:
          MOTT_MODE: canli
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p5.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P5 canli takip: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'P5 — Canlı Takip' job'ı başarısız (mod: ${{ needs.gate.outputs.mode }}). Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  # ── Aylık rapor (ayın 1'i, akşam modunda) ────────────────────────────────
  aylik-rapor:
    name: Aylık Karşılaştırma
    needs: [gate, p4-meta, p5-komite]
    if: |
      always() &&
      needs.gate.outputs.mode == 'aksam'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mott-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: mott-pip-
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Aylık rapor (ayın 1'i)
        run: |
          GUN=$(TZ=Europe/Istanbul date +%d)
          if [ "$GUN" = "01" ]; then
            python mott_aylik_rapor.py --telegram
          else
            echo "Aylık rapor yalnızca ayın 1'inde gönderilir (bugün: $GUN)"
          fi
        env:
          MOTT_MODE: aksam
      - name: Hata bildirimi (Telegram)
        if: failure()
        run: |
          TOKEN="${TELEGRAM_BOT_TOKEN:-$TELEGRAM_TOKEN}"
          [ -n "$TOKEN" ] && curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🚨 MOTT HATA: 'Aylık Karşılaştırma' job'ı başarısız. Detay: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
