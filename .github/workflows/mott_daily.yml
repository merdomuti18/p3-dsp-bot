name: MOTT Günlük Tarama — P1 + P2 + P3 + P4 + P5

on:
  schedule:
    - cron: '5 16 * * 1-5'              # ~19:05 TSİ — akşam tam tarama
    - cron: '0 6 * * 1-5'               # ~09:00 TSİ — sabah değerlendirme
    # Aşağıdaki tek blok, eski ayrı ayrı 11:00/saatlik-takip/17:30 cron'larının
    # yerini alır: 10:00–18:15 TSİ arasını 15 dakikalık boşluksuz bir ızgara
    # ile kapsar (alim/takip/kapani modları + P3/P4/P5 canlı takip için).
    - cron: '*/15 7-14 * * 1-5'         # ~10:00–17:45 TSİ
    - cron: '0,15 15 * * 1-5'           # ~18:00, 18:15 TSİ — kapanış penceresinin sonu (aksam moduna değmeden)
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Çalışma modu (TSİ)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - aksam
          - sabah
          - alim
          - takip
          - kapani

concurrency:
  group: mott-daily
  # false: artık 15 dk'da bir canlı takip tetiği eklendiği için, hâlâ
  # süren bir çalıştırmayı (ör. akşam tam taraması) yeni bir tetik
  # iptal etmesin diye kuyruğa alınır. Çalıştırmalar kısa sürdüğünden
  # (~1-2 dk) kuyruklama birikmeye yol açmaz.
  cancel-in-progress: false

env:
  MOTT_BASE_DIR: "."
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  # ── Mod belirleme (TSİ) ───────────────────────────────────────────────────
  gate:
    name: Mod — TSİ
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytz
      - id: mode
        run: |
          INPUT="${{ github.event.inputs.run_mode || 'auto' }}"
          MODE=$(python mott_mode.py "$INPUT")
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "MOTT modu (TSİ): $MODE"

  # ── P3 — yalnızca akşam tarama ────────────────────────────────────────────
  p3-dsp:
    name: P3 — DSP
    needs: gate
    if: needs.gate.outputs.mode == 'aksam'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p3-pip-${{ hashFiles('requirements_p3.txt') }}
          restore-keys: p3-pip-
      - run: |
          pip install --upgrade pip
          pip install scipy numpy yfinance pandas requests pytz
      - name: P3 akşam taraması
        run: python simulate_dsp.py
        env:
          MOTT_MODE: aksam
          DSP_USE_TV: ${{ secrets.DSP_USE_TV || '0' }}
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="reports/ portfolio_state.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P3-DSP: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done

  # ── P1 — Momentum ─────────────────────────────────────────────────────────
  p1-momentum:
    name: P1 — Momentum
    needs: gate
    if: contains(fromJSON('["aksam","sabah","alim","takip","kapani"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p1-pip-${{ hashFiles('requirements_p1.txt') }}
          restore-keys: p1-pip-
      - run: |
          pip install --upgrade pip
          pip install numpy pandas yfinance requests tradingview-screener pytz smartmoneyconcepts
      - name: P1 çalıştır
        run: |
          MODE="${{ needs.gate.outputs.mode }}"
          echo "P1 modu: $MODE"
          export MOTT_MODE="$MODE"
          if [ "$MODE" = "aksam" ]; then
            python scanner_p1.py
          elif [ "$MODE" = "sabah" ]; then
            python portfoy_yonetici.py sabah
          elif [ "$MODE" = "alim" ]; then
            python portfoy_yonetici.py alim
          elif [ "$MODE" = "takip" ]; then
            python portfoy_yonetici.py takip
          elif [ "$MODE" = "kapani" ]; then
            python portfoy_yonetici.py kapani
          fi
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p1.json tarama_listesi.json portfoy.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P1: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done

  # ── P2 — SMC ──────────────────────────────────────────────────────────────
  p2-smc:
    name: P2 — SMC
    needs: gate
    if: contains(fromJSON('["aksam","alim","takip"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p2-pip-${{ hashFiles('requirements_p2.txt') }}
          restore-keys: p2-pip-
      - run: |
          pip install --upgrade pip
          pip install numpy pandas yfinance requests tradingview-screener pytz smartmoneyconcepts
      - name: P2 çalıştır
        run: |
          MODE="${{ needs.gate.outputs.mode }}"
          export MOTT_MODE="$MODE"
          if [ "$MODE" = "aksam" ]; then
            python scanner_smc.py aksam
            python portfoy_yonetici.py p2_aksam
          else
            python scanner_smc.py teyit
            python portfoy_yonetici.py p2_takip
          fi
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p2.json tarama_listesi_p2.json portfoy_p2.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P2-SMC: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done

  # ── P4 — Meta (yalnızca akşam) ────────────────────────────────────────────
  p4-meta:
    name: P4 — Meta Portföy
    needs: [gate, p3-dsp, p1-momentum, p2-smc]
    if: |
      always() &&
      needs.gate.outputs.mode == 'aksam' &&
      needs.p3-dsp.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p4-pip-${{ hashFiles('requirements_p4.txt') }}
          restore-keys: p4-pip-
      - run: |
          pip install --upgrade pip
          pip install numpy pandas scipy yfinance requests pytz
      - name: P4 meta portföy
        run: python meta_portfolio.py
        env:
          MOTT_MODE: aksam
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p4.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P4 meta: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done

  # ── P5 — Komite (yalnızca akşam, P4 ile paralel) ─────────────────────────
  p5-komite:
    name: P5 — Komite
    needs: [gate, p3-dsp, p1-momentum, p2-smc]
    if: |
      always() &&
      needs.gate.outputs.mode == 'aksam' &&
      needs.p3-dsp.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p5-pip-${{ hashFiles('requirements_p4.txt') }}
          restore-keys: p5-pip-
      - run: |
          pip install --upgrade pip
          pip install numpy pandas scipy yfinance requests pytz
      - name: P5 komite portföy
        run: python p5_committee.py
        env:
          MOTT_MODE: aksam
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p5.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P5 komite: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done

  # ── Canlı takip — gün içi 15 dk'da bir (yalnızca açık pozisyon kontrolü) ──
  # P1/P2 zaten mevcut "alim"/"takip"/"kapani" job'ları üzerinden (daha sık
  # tetiklenen cron sayesinde) STOP/TP kontrolü yapıyor. P3/P4/P5'in normal
  # akışı yalnızca akşam çalıştığı için, STOP/TP/MAX_GUN gün içinde ancak
  # akşama kadar (saatlerce) fark edilmiyordu. Bu job'lar YALNIZCA açık
  # pozisyonları kontrol eder — yeni aday seçimi/tam tarama yapmaz.
  p3-monitor:
    name: P3 — Canlı Takip
    needs: gate
    if: contains(fromJSON('["alim","takip","kapani"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p3-pip-${{ hashFiles('requirements_p3.txt') }}
          restore-keys: p3-pip-
      - run: |
          pip install --upgrade pip
          pip install scipy numpy yfinance pandas requests pytz
      - name: P3 acil stop kontrolü
        run: python simulate_dsp.py monitor
        env:
          MOTT_MODE: canli
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="portfolio_state.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P3 canli takip: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done

  p4-monitor:
    name: P4 — Canlı Takip
    needs: gate
    if: contains(fromJSON('["alim","takip","kapani"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p4-pip-${{ hashFiles('requirements_p4.txt') }}
          restore-keys: p4-pip-
      - run: |
          pip install --upgrade pip
          pip install numpy pandas scipy yfinance requests pytz
      - name: P4 STOP/TP/MAX_GUN kontrolü
        run: python meta_portfolio.py --monitor
        env:
          MOTT_MODE: canli
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p4.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P4 canli takip: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done

  p5-monitor:
    name: P5 — Canlı Takip
    needs: gate
    if: contains(fromJSON('["alim","takip","kapani"]'), needs.gate.outputs.mode)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p5-pip-${{ hashFiles('requirements_p4.txt') }}
          restore-keys: p5-pip-
      - run: |
          pip install --upgrade pip
          pip install numpy pandas scipy yfinance requests pytz
      - name: P5 STOP/TP/MAX_GUN kontrolü
        run: python p5_committee.py --monitor
        env:
          MOTT_MODE: canli
      - name: State commit
        run: |
          git config user.name "MOTT Bot"
          git config user.email "bot@mott"
          FILES="state_p5.json"
          for i in 1 2 3 4 5; do
            git add $FILES || true
            if git diff --cached --quiet; then echo "Degisiklik yok."; break; fi
            git commit -m "P5 canli takip: $(date +'%Y-%m-%d %H:%M')" || true
            if git push origin HEAD:main; then echo "Push basarili (deneme $i)."; break; fi
            echo "Push cakismasi (deneme $i/5) - senkronize ediliyor..."
            git fetch origin main
            git reset --soft origin/main
            git add $FILES || true
            sleep $((RANDOM % 5 + 2))
          done

  # ── Aylık rapor (ayın 1'i, akşam modunda) ────────────────────────────────
  aylik-rapor:
    name: Aylık Karşılaştırma
    needs: [gate, p4-meta, p5-komite]
    if: |
      always() &&
      needs.gate.outputs.mode == 'aksam'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pandas yfinance requests pytz
      - name: Aylık rapor (ayın 1'i)
        run: |
          GUN=$(TZ=Europe/Istanbul date +%d)
          if [ "$GUN" = "01" ]; then
            python mott_aylik_rapor.py --telegram
          else
            echo "Aylık rapor yalnızca ayın 1'inde gönderilir (bugün: $GUN)"
          fi
        env:
          MOTT_MODE: aksam
