name: Test P1
on:
  workflow_dispatch:
jobs:
  test-p1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pandas yfinance requests pytz
      - run: python scanner_p1.py
        env:
          MOTT_BASE_DIR: "."
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}